name: hm-weather

services:
  weather-collector:
    image: ruby:3.3-slim
    container_name: hm-weather-collector
    volumes:
      - .:/app
      - ../shared:/app/shared
      - gem-cache:/usr/local/bundle
    working_dir: /app
    command: bash -c "bundle install --quiet && bundle exec ruby collect.rb"
    environment:
      BUNDLE_PATH: /usr/local/bundle
      WEATHER_COLLECT_INTERVAL: ${WEATHER_COLLECT_INTERVAL:-300}
      WEATHER_LATITUDE: ${WEATHER_LATITUDE}
      WEATHER_LONGITUDE: ${WEATHER_LONGITUDE}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  gem-cache:


networks:
  monitoring:
    name: hm-monitoring
    external: true
