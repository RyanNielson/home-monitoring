[agent]
  interval = "${SYSTEM_COLLECT_INTERVAL}"
  round_interval = true
  flush_interval = "10s"
  hostname = ""
  omit_hostname = false

# =============================================================================
# Output: InfluxDB v2
# =============================================================================

[[outputs.influxdb_v2]]
  # Telegraf runs on the host (not Docker), so we reach InfluxDB via its published port.
  # Docker collectors use http://influxdb:8086 instead.
  urls = ["http://localhost:8086"]
  token = "$INFLUXDB_TOKEN"
  organization = "$INFLUXDB_ORG"
  bucket = "$INFLUXDB_BUCKET"

# =============================================================================
# Inputs: System metrics
# =============================================================================

[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.disk]]
  mount_points = ["/"]

[[inputs.diskio]]

[[inputs.net]]

[[inputs.system]]

[[inputs.processes]]

[[inputs.swap]]

# =============================================================================
# Input: macOS power/battery metrics via exec plugin
# =============================================================================

[[inputs.exec]]
  commands = ["$SYSTEM_COLLECTOR_DIR/power_metrics.sh"]
  timeout = "10s"
  interval = "60s"
  data_format = "influx"
